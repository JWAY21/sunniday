name: Sunday
options:
  bundleIdPrefix: com.jway
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.jway.sunniday
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: "G46528YB86"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  Sunday:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
      - Resources/LaunchScreen.storyboard
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: SUNniDAY
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations: 
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: "SUNniDAY needs your location to determine UV levels at your current position"
        NSLocationAlwaysAndWhenInUseUsageDescription: "SUNniDAY needs your location to track UV exposure throughout the day"
        NSHealthShareUsageDescription: "SUNniDAY reads your health data to provide personalized vitamin D recommendations"
        NSHealthUpdateUsageDescription: "SUNniDAY saves your vitamin D intake data to Health app"
        UIUserInterfaceStyle: Light
        NSUserNotificationCenterUsageDescription: "SUNniDAY sends reminders for sunrise, sunset, and solar noon to help you track vitamin D"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - sunday
            CFBundleURLName: com.jway.sunniday
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "Sources"
        CODE_SIGN_ENTITLEMENTS: Resources/Sunday.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    capabilities:
      - com.apple.HealthKit
      - com.apple.BackgroundModes:
          enabled: true
          modes:
            - location
      - com.apple.ApplicationGroups:
          enabled: true
          groups:
            - group.jway21.sunniday.widget
    dependencies:
      - target: SundayWidget
  
  SundayWidget:
    type: app-extension
    platform: iOS
    sources:
      - SundayWidget
    info:
      path: SundayWidget/Info.plist
      properties:
        CFBundleDisplayName: SUNniDAY Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jway.sunniday.widget
        INFOPLIST_FILE: SundayWidget/Info.plist
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: SundayWidget/SundayWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    capabilities:
      - com.apple.ApplicationGroups:
          enabled: true
          groups:
            - group.jway21.sunniday.widget
